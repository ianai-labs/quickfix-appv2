name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'

jobs:
  # ═══════════════════════════════════════════
  # Stage 1: Code Quality
  # ═══════════════════════════════════════════
  lint:
    name: Lint & Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ═══════════════════════════════════════════
  # Stage 2: Smoke Test (with MySQL)
  # ═══════════════════════════════════════════
  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test123
          MYSQL_DATABASE: quickfix_v2
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Start App & Smoke Tests
        run: |
          cp .env.example .env
          echo "" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_NAME=quickfix_v2" >> .env
          echo "DB_USER=root" >> .env
          echo "DB_PASS=test123" >> .env
          echo "JWT_SECRET=test-secret-32-chars-minimum!!!" >> .env
          echo "JWT_REFRESH_SECRET=test-refresh-secret-32-chars!!" >> .env
          echo "DEVICE_SECRET=test-device-secret-hash!!!" >> .env
          echo "SESSION_SECRET=test-session-secret-32-chars!" >> .env
          echo "NODE_ENV=development" >> .env
          echo "PORT=3000" >> .env
          node test/smoke.test.js

  # ═══════════════════════════════════════════
  # Stage 3: Docker Build
  # ═══════════════════════════════════════════
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: quickfix-appv2:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════
  # Stage 4: Deploy (optional — manual trigger)
  # ═══════════════════════════════════════════
  deploy:
    name: Deploy (Manual)
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/quickfix-appv2:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/quickfix-appv2:${{ github.sha }}
